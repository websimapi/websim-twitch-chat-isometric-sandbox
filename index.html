<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Twitch Chat Isometric Sandbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none;
      background: #151a12;
      color: #e4e4e4;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at top, #2a3b1f 0, #151a12 55%, #090b07 100%);
    }
    #top-bar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      gap: 8px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 5;
    }
    #top-bar-left, #top-bar-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    #world-select {
      max-width: 140px;
    }
    select, button, input {
      font: inherit;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.4);
      color: inherit;
      padding: 4px 8px;
      outline: none;
    }
    select:focus, button:focus, input:focus {
      border-color: #88c36a;
    }
    button {
      cursor: pointer;
      white-space: nowrap;
    }
    #main {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
    }
    #three-container {
      position: relative;
      flex: 1 1 auto;
    }
    #three-canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    #overlay-root {
      position: absolute;
      inset: 0;
      pointer-events: none;
      font-size: 10px;
    }
    .panel {
      position: absolute;
      z-index: 10;
      background: rgba(9,11,7,0.94);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      padding: 10px;
      color: #f3f3f3;
      max-height: 95vh;
      overflow: auto;
    }
    .panel h2 {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #b8e087;
    }
    .panel h3 {
      margin: 8px 0 4px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #d5d5d5;
    }
    .panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin: 2px 0;
      font-size: 11px;
    }
    .panel-row label {
      flex: 1 1 auto;
    }
    .panel-row input[type="number"],
    .panel-row input[type="text"] {
      flex: 0 0 70px;
    }
    #settings-panel {
      right: 6px;
      top: 34px;
      width: min(320px, 92vw);
    }
    #asset-panel {
      left: 6px;
      top: 34px;
      width: min(320px, 92vw);
    }
    #world-panel {
      left: 50%;
      top: 34px;
      transform: translateX(-50%);
      width: min(340px, 92vw);
    }
    .pill {
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10px;
      background: rgba(255,255,255,0.06);
    }
    .hidden {
      display: none !important;
    }
    #toast {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #f5f5f5;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 11px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
      z-index: 20;
    }
    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }
    #live-view-indicator {
      position: absolute;
      top: 40px;
      right: 10px;
      z-index: 15;
      background: rgba(0,0,0,0.7);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #live-view-indicator-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ffb347;
      box-shadow: 0 0 6px rgba(255,179,71,0.8);
    }
    @media (max-width: 640px) {
      #top-bar {
        padding: 4px 6px;
      }
      #top-bar-left span {
        display: none;
      }
      #world-panel {
        top: auto;
        bottom: 6px;
      }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.161.0",
        "three/examples/jsm/controls/OrbitControls": "https://esm.sh/three@0.161.0/examples/jsm/controls/OrbitControls.js",
        "simplex-noise": "https://esm.sh/simplex-noise@4.0.1",
        "tmi.js": "https://esm.sh/tmi.js@1.8.5",
        "nipplejs": "https://esm.sh/nipplejs@0.9.1"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <div id="top-bar">
      <div id="top-bar-left">
        <select id="world-select"></select>
        <button id="world-new">New</button>
        <button id="world-rename">Rename</button>
        <button id="world-delete">Delete</button>
      </div>
      <div id="top-bar-right">
        <input id="twitch-channel" type="text" placeholder="Twitch channel" size="11" />
        <button id="twitch-connect">Connect</button>
        <button id="settings-toggle" title="Settings">⚙️</button>
        <button id="asset-toggle" title="Assets">🧱</button>
        <button id="world-toggle" title="World / Import / Export">🌍</button>
      </div>
    </div>
    <div id="main">
      <div id="three-container">
        <canvas id="three-canvas"></canvas>
        <div id="overlay-root"></div>
        <div id="live-view-indicator" class="hidden">
          <div id="live-view-indicator-dot"></div>
          <span>Live View linked</span>
        </div>
      </div>
    </div>
    <div id="settings-panel" class="panel hidden">
      <h2>Settings</h2>
      <h3>Rates</h3>
      <div class="panel-row">
        <label for="xp-rate">XP Rate</label>
        <input type="number" id="xp-rate" min="0.1" max="10" step="0.1" />
      </div>
      <div class="panel-row">
        <label for="action-duration">Action Duration (s)</label>
        <input type="number" id="action-duration" min="0.5" max="20" step="0.5" />
      </div>
      <h3>Visual</h3>
      <div class="panel-row">
        <label for="render-distance">Render Distance</label>
        <input type="number" id="render-distance" min="20" max="200" step="5" />
      </div>
      <h3>Terrain</h3>
      <div class="panel-row">
        <label for="terrain-seed">Seed</label>
        <input type="text" id="terrain-seed" />
      </div>
      <div class="panel-row">
        <label for="terrain-scale">Noise Scale</label>
        <input type="number" id="terrain-scale" min="2" max="40" step="1" />
      </div>
      <div class="panel-row">
        <label for="terrain-height">Height Multiplier</label>
        <input type="number" id="terrain-height" min="0.2" max="8" step="0.2" />
      </div>
      <div class="panel-row">
        <button id="regen-trees">Regenerate Trees</button>
        <button id="regen-flowers">Regenerate Flowers</button>
      </div>
      <div class="panel-row">
        <button id="regen-terrain">Regenerate Terrain</button>
      </div>
    </div>

    <div id="asset-panel" class="panel hidden">
      <h2>Asset Manager</h2>
      <h3>Upload</h3>
      <div class="panel-row">
        <label for="asset-upload-tree">Tree Sprite</label>
        <input type="file" id="asset-upload-tree" accept="image/png" />
      </div>
      <div class="panel-row">
        <label for="asset-upload-ground">Ground Sprite</label>
        <input type="file" id="asset-upload-ground" accept="image/png" />
      </div>
      <div class="panel-row">
        <label for="asset-upload-icons">Icon Sheet</label>
        <input type="file" id="asset-upload-icons" accept="image/png" />
      </div>
      <h3>AI Generate</h3>
      <div class="panel-row">
        <input type="text" id="ai-prompt" placeholder="Prompt e.g. 'pixel tree'" style="flex:1 1 auto;" />
        <button id="ai-generate">Go</button>
      </div>
      <div id="ai-status" style="font-size:10px; opacity:0.7; margin-top:4px;"></div>
      <h3>Library</h3>
      <div id="asset-library" style="display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;"></div>
    </div>

    <div id="world-panel" class="panel hidden">
      <h2>World / Import / Export</h2>
      <h3>Save Slot</h3>
      <div class="panel-row">
        <span>Current:</span>
        <span id="world-current" class="pill"></span>
      </div>
      <div class="panel-row">
        <button id="world-save-now">Save Now</button>
        <button id="world-reload">Reload</button>
      </div>
      <h3>Export</h3>
      <div class="panel-row">
        <button id="world-export">Export JSON</button>
      </div>
      <h3>Import</h3>
      <div class="panel-row">
        <input type="file" id="world-import-file" accept="application/json" />
      </div>
      <div id="world-import-status" style="font-size:10px; opacity:0.7; margin-top:4px;"></div>
      <h3>Live View</h3>
      <div style="font-size:11px; opacity:0.85; margin-bottom:4px;">
        Share this code with a viewer to link their Live View:
      </div>
      <div class="panel-row">
        <input id="live-code" type="text" readonly />
        <button id="live-code-refresh">New</button>
      </div>
    </div>

    <div id="toast"></div>
  </div>

  <script type="module" src="./src/main.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
